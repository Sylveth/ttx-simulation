<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制組管理介面 — 情境推演</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2128;
    --border: rgba(255,255,255,0.08); --border-active: rgba(255,255,255,0.2);
    --text: #e6edf3; --text-muted: #7d8590; --text-dim: #444c56;
    --accent: #f0a500; --accent-dim: rgba(240,165,0,0.12); --accent-border: rgba(240,165,0,0.4);
    --green: #3fb950; --green-dim: rgba(63,185,80,0.12);
    --red: #f85149; --red-dim: rgba(248,81,73,0.12);
    --blue: #58a6ff; --blue-dim: rgba(88,166,255,0.1);
    --purple: #bc8cff; --purple-dim: rgba(188,140,255,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-weight: 300; min-height: 100vh; }
  .header { border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(13,17,23,0.97); backdrop-filter: blur(8px); z-index: 20; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-family: 'Noto Serif TC', serif; font-size: 15px; color: var(--accent); }
  .ctrl-badge { font-size: 10px; padding: 3px 8px; border-radius: 3px; background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(188,140,255,0.3); letter-spacing: 0.06em; }
  .live-badge { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .layout { display: grid; grid-template-columns: 1fr 340px; min-height: calc(100vh - 53px); }
  .main-col { padding: 24px; border-right: 1px solid var(--border); overflow-y: auto; }
  .side-col { padding: 20px; overflow-y: auto; }
  .phase-nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .phase-chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .phase-chip:hover { border-color: var(--border-active); color: var(--text); }
  .phase-chip.active { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
  .phase-chip.done { background: var(--green-dim); border-color: rgba(63,185,80,0.3); color: var(--green); }
  .sec-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 12px; }
  .decision-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .dc-header { padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .dc-role { font-size: 13px; font-weight: 500; }
  .dc-time { font-size: 11px; color: var(--text-dim); margin-left: auto; }
  .dc-body { padding: 12px 14px; font-size: 13px; line-height: 1.8; }
  .empty { text-align: center; padding: 48px 20px; color: var(--text-dim); font-size: 14px; }
  .gen-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  .gen-header { padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); letter-spacing: 0.06em; }
  .gen-body { padding: 12px 14px; }
  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 300; line-height: 1.7; resize: vertical; min-height: 120px; transition: border-color 0.15s; }
  textarea:focus { outline: none; border-color: var(--accent-border); }
  textarea::placeholder { color: var(--text-dim); }
  .btn { padding: 10px 16px; border-radius: 5px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; border: 1px solid; width: 100%; margin-top: 8px; font-weight: 400; }
  .btn-purple { background: var(--purple-dim); border-color: rgba(188,140,255,0.3); color: var(--purple); }
  .btn-purple:hover { background: rgba(188,140,255,0.15); }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
  .btn-accent:hover { background: #ffb700; }
  .btn-accent:disabled { background: var(--surface2); border-color: var(--border); color: var(--text-dim); cursor: not-allowed; }
  .btn-red { background: var(--red-dim); border-color: rgba(248,81,73,0.3); color: var(--red); }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .btn-grid .btn { margin-top: 0; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: var(--surface2); border-radius: 6px; padding: 12px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 500; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .status-line { font-size: 12px; padding: 8px 12px; border-radius: 5px; margin-bottom: 12px; }
  .status-collecting { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.2); }
  .status-ready { background: var(--green-dim); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-top: 8px; }
  .upload-zone { border: 1px dashed rgba(188,140,255,0.3); border-radius: 6px; padding: 14px; text-align: center; cursor: pointer; transition: all 0.15s; }
  .upload-zone:hover { border-color: var(--purple); background: var(--purple-dim); }
  .upload-zone input { display: none; }
  .file-chip { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; margin-top: 6px; font-size: 12px; }
  .file-chip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chip-ok { color: var(--green); flex-shrink: 0; }
  .file-chip-rm { color: var(--text-dim); cursor: pointer; flex-shrink: 0; }
  .file-chip-rm:hover { color: var(--red); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-box { background: #1c2128; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; max-width: 600px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 13px; color: var(--accent); font-weight: 500; }
  .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 18px; }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-pre { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid rgba(255,255,255,0.08); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .modal-btn { padding: 10px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 500; text-align: center; text-decoration: none; display: block; border: 1px solid; }
  .modal-btn-copy { background: var(--purple-dim); border-color: rgba(188,140,255,0.3); color: var(--purple); }
  .modal-btn-open { background: var(--accent); border-color: var(--accent); color: #000; }
  @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } .main-col { border-right: none; border-bottom: 1px solid var(--border); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-title">情境推演</div>
    <div class="ctrl-badge">控制組</div>
  </div>
  <div class="live-badge"><div class="dot"></div><span id="liveCount">讀取中...</span></div>
</div>

<div class="layout">
  <div class="main-col" id="mainCol"><div style="color:var(--text-muted);padding:40px;text-align:center">載入中...</div></div>
  <div class="side-col" id="sideCol"></div>
</div>

<script>
const FB_URL = 'https://ttxproject-382cf-default-rtdb.asia-southeast1.firebasedatabase.app/ttx-session.json';
const POLL_MS = 2500;

const ROLES = [
  { id: 'local-gov', icon: '🏛', name: '地方政府代表' },
  { id: 'energy-authority', icon: '⚡', name: '能源主管機關' },
  { id: 'citizen-plant', icon: '☀️', name: '公民電廠代表' },
  { id: 'microgrid', icon: '🔋', name: '微電網／儲能業者' },
  { id: 'mobile-charge', icon: '🚐', name: '移動式充電業者' },
  { id: 'local-industry', icon: '🐟', name: '在地產業代表' },
  { id: 'scholar', icon: '📚', name: '學者' },
  { id: 'community', icon: '🏘', name: '社區代表' },
];
const PHASES = ['狀況一：停電12小時', '狀況二：停電三天', '狀況三：停電七天', '綜合交流'];
let uploadedDocs = [];
const getRoleInfo = id => ROLES.find(r => r.id === id) || { icon: '?', name: id };

async function getState() {
  const r = await fetch(FB_URL);
  const d = await r.json();
  if (!d) return { phase: 0, submissions: {}, nextScenario: null, status: 'collecting' };
  return d;
}

async function putState(s) {
  await fetch(FB_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(s)
  });
}

function isUserTyping() {
  const a = document.activeElement;
  return a && (a.tagName === 'TEXTAREA' || a.tagName === 'INPUT');
}

function render(s, force) {
  const subCount = Object.keys(s.submissions || {}).length;
  document.getElementById('liveCount').textContent = `${subCount} 位已送出 · 第 ${s.phase + 1} 回合`;
  renderMain(s);
  if (force || !isUserTyping()) renderSide(s);
}

function renderMain(s) {
  const subs = s.submissions || {};
  const subEntries = Object.entries(subs);
  let html = `
    <div class="phase-nav">
      ${PHASES.map((p, i) => `<div class="phase-chip ${i===s.phase?'active':i<s.phase?'done':''}" onclick="jumpPhase(${i})">${i+1}. ${p}</div>`).join('')}
    </div>
    <div class="sec-title">參演者決策（${subEntries.length} / ${ROLES.length} 位已送出）</div>`;
  if (!subEntries.length) {
    html += `<div class="empty">尚無參演者送出決策<br><span style="font-size:12px;display:block;margin-top:4px">等待中...</span></div>`;
  } else {
    html += subEntries.map(([id, sub]) => {
      const ri = getRoleInfo(id);
      const t = new Date(sub.time);
      const ts = `${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}`;
      return `<div class="decision-card">
        <div class="dc-header"><span>${ri.icon}</span><span class="dc-role">${ri.name}</span><span class="dc-time">${ts}</span></div>
        <div class="dc-body">${sub.text}</div>
      </div>`;
    }).join('');
  }
  document.getElementById('mainCol').innerHTML = html;
}

function renderSide(s) {
  const subCount = Object.keys(s.submissions || {}).length;
  const isReady = s.status === 'next-ready';
  const editorVal = document.getElementById('scenarioEditor')?.value ?? (s.nextScenario || '');

  document.getElementById('sideCol').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${subCount}</div><div class="stat-label">已送出</div></div>
      <div class="stat-card"><div class="stat-num">${s.phase + 1}</div><div class="stat-label">當前回合</div></div>
    </div>
    <div class="status-line ${isReady ? 'status-ready' : 'status-collecting'}">${isReady ? '✓ 下一情境已發布' : `等待決策中（${subCount}/${ROLES.length}）`}</div>
    <div class="divider"></div>
    <div class="sec-title">下一回合情境</div>
    <div class="gen-card">
      <div class="gen-header">情境內容（可直接輸入或用 Claude 生成）</div>
      <div class="gen-body">
        <textarea id="scenarioEditor" placeholder="直接輸入下一回合情境，或點下方按鈕用 Claude 生成...">${editorVal}</textarea>
        <div class="btn-grid">
          <button class="btn btn-purple" onclick="copyDecisions()">📋 複製決策摘要</button>
          <button class="btn btn-purple" onclick="openClaude()">✦ 用 Claude 生成</button>
        </div>
        <div class="hint">按「用 Claude 生成」會顯示 prompt，複製後貼到 Claude 對話框，再把回答貼回上方文字框。</div>
      </div>
    </div>
    <button class="btn btn-accent" onclick="advancePhase()" ${subCount === 0 ? 'disabled' : ''}>→ 發布情境並推進至下一回合</button>
    <div class="divider"></div>
    <div class="sec-title">背景資料文件</div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault()" ondrop="event.preventDefault();handleFiles(event.dataTransfer.files)">
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt" multiple onchange="handleFiles(this.files)">
      <div style="font-size:20px;margin-bottom:6px">📄</div>
      <div style="font-size:12px;color:var(--text-muted)">拖曳或<span style="color:var(--purple)">點擊上傳</span><br>PDF、Word、TXT</div>
    </div>
    <div id="fileList">${renderFileList()}</div>
    <div class="hint">上傳後 Claude 生成情境時會自動帶入這些文件內容。</div>
    <div class="divider"></div>
    <button class="btn btn-red" onclick="resetSession()">⟳ 重置整場推演</button>`;
}

function buildPrompt(s) {
  const subs = Object.entries(s.submissions || {});
  const decisionsText = subs.map(([id, sub]) => `【${getRoleInfo(id).name}】${sub.text}`).join('\n\n');
  const nextNames = ['停電三天', '停電七天', '綜合交流'];
  const nextPhase = nextNames[s.phase] || '綜合交流';
  const docContext = uploadedDocs.length > 0
    ? `\n\n背景參考文件：\n${uploadedDocs.map(d => `【${d.name}】\n${d.text.slice(0, 1500)}`).join('\n\n')}`
    : '';
  return `你是情境模擬工作坊的控制組，請根據以下參演者的決策，生成「${nextPhase}」的情境卡，並檢查數值落差。

研究背景：颱風重創臺南七股、將軍一帶，分散式能源治理困境研究。${docContext}

當前回合：${PHASES[s.phase]}
參演者決策：
${decisionsText}

請完成以下兩個任務：

【任務一】生成情境卡
- 150字以內
- 描述災情進展與新壓力點
- 直接回應上一回合決策的後果
- 繁體中文，語氣簡潔有力

【任務二】數值落差檢查
請仔細檢查每位參演者決策中提到的具體數值（供電量kW、儲能容量kWh、時間、人力、燃料量等），與背景資料文件中的資源上限或實際條件對照。
- 若有落差，在情境卡後面另起一段，格式如下：

⚠️ 數值落差提醒：
• [角色名稱]：聲稱 [數值]，資源卡顯示 [實際上限]（[說明落差影響]）

- 若背景資料中沒有相關數值，或決策中沒有提到具體數值，則略過此段
- 只輸出情境卡內容與落差提醒，不需要其他說明`;
}

async function copyDecisions() {
  const s = await getState();
  const prompt = buildPrompt(s);
  try {
    await navigator.clipboard.writeText(prompt);
    alert('✓ 已複製！請貼到 Claude 對話框');
  } catch { alert('複製失敗，請手動選取文字'); }
}

async function openClaude() {
  const s = await getState();
  const subs = Object.entries(s.submissions || {});
  if (!subs.length) { alert('尚無參演者送出決策'); return; }
  const prompt = buildPrompt(s);

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">複製以下內容 → 貼到 Claude 對話框 → 把回答貼回情境框</span>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="modal-body">
        <pre class="modal-pre">${prompt.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-copy" id="modalCopyBtn" onclick="modalCopy()">📋 複製 Prompt</button>
        <a class="modal-btn modal-btn-open" href="https://claude.ai/new" target="_blank">開啟 Claude ↗</a>
      </div>
    </div>`;
  document.body.appendChild(modal);
  window._modalPrompt = prompt;
}

async function modalCopy() {
  try {
    await navigator.clipboard.writeText(window._modalPrompt || '');
    const btn = document.getElementById('modalCopyBtn');
    btn.textContent = '✓ 已複製！';
    setTimeout(() => { btn.textContent = '📋 複製 Prompt'; }, 2000);
  } catch { alert('請手動選取文字複製'); }
}

async function advancePhase() {
  const editorVal = document.getElementById('scenarioEditor')?.value.trim();
  if (!editorVal && !confirm('情境內容為空，確定推進？')) return;
  const s = await getState();
  s.nextScenario = editorVal || null;
  s.phase = Math.min(s.phase + 1, 3);
  s.submissions = {};
  s.status = 'next-ready';
  await putState(s);
  render(s, true);
}

async function jumpPhase(i) {
  if (!confirm(`跳到第 ${i+1} 回合？當前決策記錄將被清除。`)) return;
  const s = await getState();
  s.phase = i; s.submissions = {}; s.nextScenario = null; s.status = 'collecting';
  await putState(s); render(s, true);
}

async function resetSession() {
  if (!confirm('確定重置整場推演？所有資料將清除。')) return;
  const s = { phase: 0, submissions: {}, nextScenario: null, status: 'collecting' };
  await putState(s); render(s, true);
}

function renderFileList() {
  return uploadedDocs.map((d, i) => `
    <div class="file-chip">
      <span>📄</span>
      <span class="file-chip-name">${d.name}</span>
      <span class="file-chip-ok">${d.text ? '✓' : '讀取中...'}</span>
      <span class="file-chip-rm" onclick="uploadedDocs.splice(${i},1);document.getElementById('fileList').innerHTML=renderFileList()">✕</span>
    </div>`).join('');
}

async function handleFiles(files) {
  for (const file of files) {
    const idx = uploadedDocs.length;
    uploadedDocs.push({ name: file.name, text: '' });
    document.getElementById('fileList').innerHTML = renderFileList();
    try {
      const name = file.name.toLowerCase();
      if (name.endsWith('.txt')) {
        uploadedDocs[idx].text = await file.text();
      } else if (name.endsWith('.pdf')) {
        uploadedDocs[idx].text = '[PDF已上傳，將在生成時一併傳送]';
        uploadedDocs[idx].file = file;
      } else if (name.endsWith('.docx')) {
        const buf = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buf });
        uploadedDocs[idx].text = result.value;
      }
    } catch { uploadedDocs[idx].text = '[讀取失敗]'; }
    document.getElementById('fileList').innerHTML = renderFileList();
  }
}

async function init() {
  const s = await getState();
  render(s, true);
  setInterval(async () => {
    const s2 = await getState();
    if (s2) render(s2);
  }, POLL_MS);
}

init();
</script>
</body>
</html>
